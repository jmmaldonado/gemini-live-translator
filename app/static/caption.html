<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Translator — Caption Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "Google Sans", "Noto Sans", "Noto Sans JP", sans-serif; }

    #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: contain; display: block; }

    #prompt {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #1a1a2e; color: #fff; gap: 1.2rem; z-index: 10;
    }
    #prompt h2 { font-size: 1.4rem; font-weight: 500; }
    #prompt p { font-size: 0.95rem; color: #aaa; max-width: 28rem; text-align: center; line-height: 1.5; }
    #prompt button {
      padding: 0.7rem 2rem; font-size: 1rem; border: none; border-radius: 0.5rem;
      background: #4285f4; color: #fff; cursor: pointer;
    }
    #prompt button:hover { background: #3367d6; }
    #prompt.hidden { display: none; }

    #lines {
      position: fixed; bottom: 2rem; left: 2rem; right: 2rem;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.3rem; pointer-events: none; z-index: 20;
    }

    .line {
      font-size: 2rem; line-height: 1.4; color: #fff;
      background: rgba(0, 0, 0, 0.7);
      padding: 0.25rem 0.8rem; border-radius: 0.4rem;
      max-width: 90%; text-align: center; word-wrap: break-word;
      animation: line-in 0.25s ease-out;
    }
    .line.fade-out { animation: line-out 0.8s ease-in forwards; }

    .typing-indicator {
      display: inline-block; width: 0.5rem; height: 0.5rem;
      background: rgba(255, 255, 255, 0.7); border-radius: 50%;
      margin-left: 0.3rem; vertical-align: middle;
      animation: blink 0.8s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    @keyframes line-in { from { opacity: 0; transform: translateY(0.5rem); } to { opacity: 1; transform: translateY(0); } }
    @keyframes line-out { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>
  <video id="video" autoplay muted></video>

  <div id="prompt">
    <h2>Caption Overlay</h2>
    <p>Select a window to mirror. Translated subtitles will appear at the bottom. Share this window on Google Meet.</p>
    <button id="startCapture">Select Window</button>
  </div>

  <div id="lines"></div>

  <script>
    const MAX_LINES = 3;
    const FADE_DELAY_MS = 8000;
    const video = document.getElementById("video");
    const prompt = document.getElementById("prompt");
    const linesEl = document.getElementById("lines");
    const channel = new BroadcastChannel("live-translator");

    let currentLine = null;
    let currentText = "";

    document.getElementById("startCapture").addEventListener("click", async () => {
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always" },
          audio: false,
          preferCurrentTab: false,
        });
        video.srcObject = stream;
        prompt.classList.add("hidden");
        stream.getVideoTracks()[0].addEventListener("ended", () => {
          video.srcObject = null;
          prompt.classList.remove("hidden");
        });
      } catch {
        // User cancelled the picker
      }
    });

    function addLine(text, partial) {
      const div = document.createElement("div");
      div.className = "line";
      div.textContent = text;
      if (partial) {
        const dot = document.createElement("span");
        dot.className = "typing-indicator";
        div.appendChild(dot);
      }
      linesEl.appendChild(div);
      currentLine = div;
      currentText = text;
      trimLines();
      if (!partial) scheduleFade(div);
    }

    function updateLine(text, partial) {
      if (!currentLine) { addLine(text, partial); return; }
      const dot = currentLine.querySelector(".typing-indicator");
      if (dot) dot.remove();
      currentLine.textContent = text;
      currentText = text;
      if (partial) {
        const d = document.createElement("span");
        d.className = "typing-indicator";
        currentLine.appendChild(d);
      } else {
        scheduleFade(currentLine);
      }
    }

    function finalize() {
      if (currentLine) {
        const dot = currentLine.querySelector(".typing-indicator");
        if (dot) dot.remove();
        scheduleFade(currentLine);
      }
      currentLine = null;
      currentText = "";
    }

    function scheduleFade(el) {
      setTimeout(() => {
        el.classList.add("fade-out");
        el.addEventListener("animationend", () => el.remove());
      }, FADE_DELAY_MS);
    }

    function trimLines() {
      while (linesEl.children.length > MAX_LINES) {
        linesEl.removeChild(linesEl.firstChild);
      }
    }

    channel.onmessage = (e) => {
      const msg = e.data;
      if (msg.type === "outputTranscription") {
        if (!currentLine) {
          addLine(msg.text, !msg.finished);
        } else {
          updateLine(msg.text, !msg.finished);
        }
        if (msg.finished) {
          currentLine = null;
          currentText = "";
        }
      } else if (msg.type === "turnComplete") {
        finalize();
      }
    };
  </script>
</body>
</html>
