<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Translator Overlay</title>
  <link rel="stylesheet" href="/static/css/overlay.css">
</head>
<body>
  <div id="lines"></div>
  <script>
    const MAX_LINES = 3;
    const FADE_DELAY_MS = 8000;
    const linesEl = document.getElementById("lines");
    const channel = new BroadcastChannel("live-translator");

    let currentLine = null;
    let currentText = "";

    function addLine(text, partial) {
      const div = document.createElement("div");
      div.className = "line";
      div.textContent = text;
      if (partial) {
        const dot = document.createElement("span");
        dot.className = "typing-indicator";
        div.appendChild(dot);
      }
      linesEl.appendChild(div);
      currentLine = div;
      currentText = text;
      trimLines();
      if (!partial) scheduleFade(div);
    }

    function updateLine(text, partial) {
      if (!currentLine) { addLine(text, partial); return; }
      const dot = currentLine.querySelector(".typing-indicator");
      if (dot) dot.remove();
      currentLine.textContent = text;
      currentText = text;
      if (partial) {
        const d = document.createElement("span");
        d.className = "typing-indicator";
        currentLine.appendChild(d);
      } else {
        scheduleFade(currentLine);
      }
    }

    function finalize() {
      if (currentLine) {
        const dot = currentLine.querySelector(".typing-indicator");
        if (dot) dot.remove();
        scheduleFade(currentLine);
      }
      currentLine = null;
      currentText = "";
    }

    function scheduleFade(el) {
      setTimeout(() => {
        el.classList.add("fade-out");
        el.addEventListener("animationend", () => el.remove());
      }, FADE_DELAY_MS);
    }

    function trimLines() {
      while (linesEl.children.length > MAX_LINES) {
        linesEl.removeChild(linesEl.firstChild);
      }
    }

    channel.onmessage = (e) => {
      const msg = e.data;
      if (msg.type === "outputTranscription") {
        if (!currentLine) {
          addLine(msg.text, !msg.finished);
        } else {
          updateLine(msg.text, !msg.finished);
        }
        if (msg.finished) {
          currentLine = null;
          currentText = "";
        }
      } else if (msg.type === "turnComplete") {
        finalize();
      }
    };
  </script>
</body>
</html>
